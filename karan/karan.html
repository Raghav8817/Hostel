<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense App</title>

</head>

<body>

<!-- AUTH SECTION -->
<div class="card" id="authCard">

    <!-- LOGIN -->
   
    <!-- REGISTER -->
    <div id="register" class="form">
        <h2>Register</h2>
        <div class="uploadBox" onclick="document.getElementById('file').click()">
            <img id="regImg" style="display:none;">
            <span id="txt">+</span>
        </div>
        <input type="file" id="file" hidden accept="image/*" onchange="previewRegImg(event)">

        <div class="inputBox"><input id="regName" required><label>Name</label></div>
        <div class="inputBox"><input id="regEmail" required><label>Email</label></div>
        <div class="inputBox"><input id="regPass" type="password" required><label>Password</label></div>
        <div class="inputBox"><input id="regCpass" type="password" required><label>Confirm Password</label></div>

        <div class="captchaBox">
            <div class="captcha" id="cap2Text"></div>
            <span onclick="genCap(2)">🔄</span>
        </div>
        <div class="inputBox"><input id="cap2" required><label>Captcha</label></div>

        <button onclick="register()">Register</button>
        <div class="links"><a onclick="show('login')">Back to Login</a></div>
    </div>

    <!-- FORGOT + OTP + RESET (unchanged for brevity) -->
    <div id="forgot" class="form">
        <h2>Forgot Password</h2>
        <div class="inputBox"><input id="femail" required><label>Email</label></div>
        <div class="captchaBox"><div class="captcha" id="cap3Text"></div><span onclick="genCap(3)">🔄</span></div>
        <div class="inputBox"><input id="cap3" required><label>Captcha</label></div>
        <button onclick="sendOTP()">Send OTP</button>
        <div class="links"><a onclick="show('login')">Back</a></div>
    </div>

    <div id="otp" class="form">
        <h2>Enter OTP</h2>
        <div class="inputBox"><input id="otpVal" required><label>OTP</label></div>
        <div class="captchaBox"><div class="captcha" id="cap4Text"></div><span onclick="genCap(4)">🔄</span></div>
        <div class="inputBox"><input id="cap4" required><label>Captcha</label></div>
        <button onclick="verifyOTP()">Verify</button>
    </div>

    <div id="reset" class="form">
        <h2>New Password</h2>
        <div class="inputBox"><input id="newPass" type="password" required><label>New Password</label></div>
        <div class="inputBox"><input id="confirmNewPass" type="password" required><label>Confirm Password</label></div>
        <div class="captchaBox"><div class="captcha" id="cap5Text"></div><span onclick="genCap(5)">🔄</span></div>
        <div class="inputBox"><input id="cap5" required><label>Captcha</label></div>
        <button onclick="resetPass()">Update Password</button>
    </div>
</div>

<!-- DASHBOARD SECTION -->


<script>
   // 1. Assign the function to the onload property (no parentheses here)
const lala=window.onload = function() {
    if (isProfileStored()) {
        console.log("Data found! Loading profile...");
        loadProfile(); // Run your function to fill the UI
    } else {
        login()
        // Optional: window.location.href = "signup.html";
    }
};
lala()

// 2. The helper function to check storage
function isProfileStored() {
    const data = localStorage.getItem("profile");
    
    // Returns true if data exists, false if it is null
    return data !== null;
}

// 3. Your existing load function
function loadProfile() {
    const data = JSON.parse(localStorage.getItem("profile"));
    document.getElementById("topBarName").innerText = data.name;
    document.getElementById("topBarImg").src = data.img;
}
// ====================== COMMON ======================
function show(id){
    document.querySelectorAll(".form").forEach(f => f.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

let caps = {};
function genCap(n){
    caps[n] = Math.random().toString(36).substring(2,7).toUpperCase();
    document.getElementById("cap"+n+"Text").innerText = caps[n];
}
function checkCap(n, id){
    return document.getElementById(id).value.toUpperCase() === caps[n];
}

// ====================== REGISTER ======================
function previewRegImg(e){
    const img = document.getElementById("regImg");
    // img.src = URL.createObjectURL(e.target.files[0]);
    img.src=localStorage.getItem()
    img.style.display = "block";
    document.getElementById("txt").style.display = "none";
}

function register(){
    if(!checkCap(2,"cap2")) return alert("Wrong Captcha!");

    const pass = document.getElementById("regPass").value;
    const cpass = document.getElementById("regCpass").value;
    if(pass !== cpass) return alert("Password mismatch!");

    const regImg = document.getElementById("regImg");

    const profileData = {
        name: document.getElementById("regName").value,
        email: document.getElementById("regEmail").value,
        img: regImg.style.display === "block" ? regImg.src : "https://i.pravatar.cc/80"
    };

    localStorage.setItem("email", profileData.email);
    localStorage.setItem("pass", pass);
    localStorage.setItem("profile", JSON.stringify(profileData));

    alert("Registered Successfully ✅");
    show("login");
}

// ====================== LOGIN ======================
function loadlogin(){
    return(` <div id="login" class="form active">
        <h2>Login</h2>
        <div class="inputBox"><input id="loginEmail" required><label>Email</label></div>
        <div class="inputBox"><input id="loginPass" type="password" required><label>Password</label></div>

        <div class="captchaBox">
            <div class="captcha" id="cap1Text"></div>
            <span onclick="genCap(1)">🔄</span>
        </div>
        <div class="inputBox"><input id="cap1" required><label>Captcha</label></div>

        <button onclick="login()">Login</button>
        <div class="links">
            <a onclick="show('register')">Register</a>
            <a onclick="show('forgot')">Forgot Password</a>
        </div>
    </div>
`)
}
function login(){
    loadlogin()
    if(!checkCap(1,"cap1")) return alert("Wrong Captcha!");

    const email = document.getElementById("loginEmail").value;
    console.log(email)
    const pass = document.getElementById("loginPass").value;
    console.log(pass);
    
    if(email == localStorage.getItem("email") && pass == localStorage.getItem("pass")){
        alert("Login Successful ✅");
        document.getElementById("authCard").style.display = "none";
        document.getElementById("dashboardContainer").style.display = "flex";
        loadProfile();   // Load saved image + data
        return("<h3>skjdbfskbvsk</h3>");
    } else {
        alert("Invalid Email or Password ❌");
    }
}

// ====================== FORGOT PASSWORD (unchanged) ======================
function sendOTP(){ if(!checkCap(3,"cap3")) return alert("Wrong Captcha!"); localStorage.setItem("otp","1234"); alert("Demo OTP: 1234"); show("otp"); }
function verifyOTP(){ if(!checkCap(4,"cap4")) return alert("Wrong Captcha!"); if(document.getElementById("otpVal").value==="1234") show("reset"); else alert("Wrong OTP"); }
function resetPass(){
    if(!checkCap(5,"cap5")) return alert("Wrong Captcha!");
    if(document.getElementById("newPass").value !== document.getElementById("confirmNewPass").value) return alert("Password mismatch!");
    localStorage.setItem("pass", document.getElementById("newPass").value);
    alert("Password Updated ✅");
    show("login");
}

// ====================== DASHBOARD ======================
function toggleMenu(){
    const dd = document.getElementById("dropdown");
    dd.style.display = (dd.style.display === "block") ? "none" : "block";
}

function openProfile(){
    document.getElementById("dashboardPage").style.display = "none";
    document.getElementById("profilePage").style.display = "block";
    loadProfile();
}

function goBack(){
    document.getElementById("profilePage").style.display = "none";
    document.getElementById("dashboardPage").style.display = "block";
}
function loadprofilepage(){
    return(`<div id="dashboardContainer">
    <div class="container">
        <!-- Dashboard Page -->
        <div id="dashboardPage">
            <div class="topbar">
                <h2>Expense Dashboard</h2>
                <div class="profile" onclick="toggleMenu()">
                    <img id="profileImg" src="https://i.pravatar.cc/40">
                    <div class="dropdown" id="dropdown">
                        <p onclick="openProfile()">👤 Profile</p>
                        <p onclick="logout()">🚪 Logout</p>
                    </div>
                </div>
            </div>

            <div class="dashboard-card">
                <input id="title" placeholder="Title">
                <input id="amount" type="number" placeholder="Amount">
                <input id="date" type="date">
                <select id="type">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
                <button onclick="addTransaction()">Add Transaction</button>
            </div>

            <div class="dashboard-card">
                <h3>Summary</h3>
                <p>Balance: <span id="balance">0</span></p>
                <p>Income: <span id="income">0</span></p>
                <p>Expense: <span id="expense">0</span></p>
            </div>

            <div class="dashboard-card">
                <h3>Transactions</h3>
                <div id="data"></div>
            </div>
        </div>

        <!-- Profile Page -->
        <div id="profilePage" style="display:none;">
            <div class="dashboard-card">
                <h2>My Profile</h2>
                <div class="profile-img">
                    <img id="preview" src="https://i.pravatar.cc/80">
                </div>
                <input type="file" id="profileFile" accept="image/*" onchange="loadImage(event)">
                <input id="profName" placeholder="Name">
                <input id="profEmail" placeholder="Email">
                <input id="profPhone" placeholder="Phone">
                <button onclick="saveProfile()">Save Changes</button>
                <button onclick="goBack()">Back to Dashboard</button>
            </div>
        </div>
    </div>
</div>`)
}
function loadProfile(){
    loadprofilepage()
    const p = JSON.parse(localStorage.getItem("profile"));
    console.log(p.img);
    
    if(p){
        document.getElementById("profName").value = p.name || "";
        document.getElementById("profEmail").value = p.email || "";
        document.getElementById("profPhone").value = p.phone || "";
        
        const imgSrc = p.img || "https://i.pravatar.cc/80";
        document.getElementById("preview").src = imgSrc;
        document.getElementById("profileImg").src = imgSrc;
    }
}

// function loadImage(e){
//     const newSrc = URL.createObjectURL(e.target.files[0]);
//     document.getElementById("preview").src = newSrc;
// }

function loadImage(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onloadend = () => {
        // This makes the image "ready" for the saveProfile function
        document.getElementById("preview").src = reader.result;
    };

    if (file) {
        reader.readAsDataURL(file);
    }
}
function saveProfile() {
    const previewSrc = document.getElementById("preview").src;

    // Check if user has actually picked an image yet
    if (previewSrc.startsWith("blob:")) {
        alert("Please wait for the image to load or try re-uploading.");
        return;
    }

    const profile = {
        name: document.getElementById("profName").value,
        email: document.getElementById("profEmail").value,
        phone: document.getElementById("profPhone").value,
        img: previewSrc // This is now the permanent Base64 string
    };

    try {
        localStorage.setItem("profile", JSON.stringify(profile));
        alert("Profile Saved ✅");
        
        if (typeof loadProfile === "function") loadProfile();
        if (typeof goBack === "function") goBack();
    } catch (e) {
        alert("Storage full! Try a smaller image.");
    }
}

// Transactions
let data = JSON.parse(localStorage.getItem("data")) || [];

function addTransaction(){
    const title = document.getElementById("title").value.trim();
    const amount = parseFloat(document.getElementById("amount").value);
    const date = document.getElementById("date").value;
    const type = document.getElementById("type").value;

    if(!title || !amount || !date){
        alert("Please fill all fields");
        return;
    }

    data.push({title, amount, type, date});
    localStorage.setItem("data", JSON.stringify(data));

    document.getElementById("title").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("date").value = "";

    render();
}

function render(){
    let inc = 0, exp = 0, html = "";

    data.forEach(d => {
        if(d.type === "income") inc += d.amount;
        else exp += d.amount;

        html += `
        <div class="transaction ${d.type}">
            <span>${d.title}</span>
            <span>${d.amount}</span>
            <span>${d.date}</span>
        </div>`;
    });

    document.getElementById("data").innerHTML = data.length === 0 
        ? `<p style="text-align:center; padding:20px; color:#94a3b8;">No transactions yet!</p>` 
        : html;

    document.getElementById("income").innerText = inc;
    document.getElementById("expense").innerText = exp;
    document.getElementById("balance").innerText = inc - exp;
}

function logout(){
    if(confirm("Are you sure you want to logout?")){
        localStorage.clear();
        location.reload();
    }
}

// Init
window.onload = () => {
    genCap(1); genCap(2); genCap(3); genCap(4); genCap(5);
};
</script>

</body>
</html>
